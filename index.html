<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LookThatCats</title>
<style>
  body {
    background-color: #121212;
    color: #eee;
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    text-align: center;
  }
  h1 { margin: 20px; }
  .container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .container img {
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    transition: transform 0.3s;
    cursor: pointer;
  }
  .container img:hover { transform: scale(1.05); }
  #nextBtn {
    padding: 10px 20px;
    background-color: #1f1f1f;
    color: #eee;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-bottom: 30px;
    font-size: 18px;
  }
  #topCatsContainer {
    margin-top: 40px;
  }
  #topCatsContainer h2 { margin-bottom: 10px; }
  .top-cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(120px,1fr));
    gap: 15px;
    justify-items: center;
  }
  .top-cat-grid img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 10px;
    transition: transform 0.3s;
  }
  .top-cat-grid img:hover { transform: scale(1.1); }
  /* Banner alanları */
  #left-ad, #right-ad {
    position: fixed;
    top: 100px;
    width: 120px;
    height: 600px;
    background-color: #222;
    color: #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #left-ad { left: 0; }
  #right-ad { right: 0; }
  #bottom-ad {
    width: 100%;
    height: 90px;
    background-color: #222;
    color: #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    bottom: 0;
  }
</style>
</head>
<body>

<div id="left-ad">Left Banner</div>
<div id="right-ad">Right Banner</div>

<h1>LookThatCats 🐱</h1>

<div class="container">
  <img id="cat1" src="" alt="Cat 1">
  <img id="cat2" src="" alt="Cat 2">
</div>
<button id="nextBtn">Next Battle 🐾</button>

<div id="topCatsContainer">
  <h2>Today's Top Cats</h2>
  <div id="topCats" class="top-cat-grid"></div>
</div>

<div id="bottom-ad">Bottom Banner</div>

<script>
const API_KEY = "live_fDX7IYEHhfAbsRlNUYMHWpBRLFjjra8l8ixoHazYl93KLEkPHf5yUuV6OhabAb7R";

// Rastgele 2 battle kedisi yükle
async function loadBattleCats() {
  const res1 = await fetch("https://api.thecatapi.com/v1/images/search", {
    headers: {'x-api-key': API_KEY}
  });
  const cat1 = await res1.json();
  document.getElementById("cat1").src = cat1[0].url;

  const res2 = await fetch("https://api.thecatapi.com/v1/images/search", {
    headers: {'x-api-key': API_KEY}
  });
  const cat2 = await res2.json();
  document.getElementById("cat2").src = cat2[0].url;
}

// Top 10 kediyi 24 saatte bir yenile
async function loadTopCats() {
  const today = new Date().toISOString().slice(0,10); // YYYY-MM-DD
  let saved = JSON.parse(localStorage.getItem("topCatsData"));
  if (!saved || saved.date !== today) {
    const topCats = [];
    for (let i=0;i<10;i++){
      const res = await fetch("https://api.thecatapi.com/v1/images/search", {
        headers: {'x-api-key': API_KEY}
      });
      const data = await res.json();
      topCats.push(data[0].url);
    }
    localStorage.setItem("topCatsData", JSON.stringify({date: today, urls: topCats}));
    saved = {date: today, urls: topCats};
  }
  const container = document.getElementById("topCats");
  container.innerHTML = "";
  saved.urls.forEach(url=>{
    const img = document.createElement("img");
    img.src = url;
    container.appendChild(img);
  });
}

// Başlangıçta yükle
loadBattleCats();
loadTopCats();

// Next Battle butonuna bağla
document.getElementById("nextBtn").addEventListener("click", loadBattleCats);
</script>

</body>
</html>
