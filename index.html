<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>LookThatCats - Daily Cat Tournament</title>

<meta name="description" content="Vote for the cutest cats and play the daily cat tournament on LookThatCats.">
<meta name="keywords" content="cute cats, cat voting game, cat tournament, funny cats">
<meta name="robots" content="index,follow">

<link rel="icon" type="image/svg+xml" href="/pink-cat-logo.svg?v=2">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
background:#121212;
color:white;
font-family:Inter,Arial;
margin:0;
text-align:center;
}

.page{
max-width:1200px;
margin:0 auto;
padding:25px 20px 60px;
}

.logo{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
font-size:34px;
font-weight:800;
color:#ff69b4;
}

.logo img{
width:60px;
height:60px;
}

.subtitle{
color:#aaa;
margin-top:10px;
}

.tournament-btn{
margin-top:20px;
padding:12px 22px;
background:linear-gradient(90deg,#ff69b4,#ff95cb);
border:none;
border-radius:999px;
font-weight:800;
cursor:pointer;
}

.section{
margin-top:50px;
}

.line{
width:80%;
height:1px;
background:#2a2a2a;
margin:50px auto;
}

.battle{
display:flex;
justify-content:center;
gap:40px;
margin-top:30px;
flex-wrap:wrap;
}

.cat-card{
background:#1b1b1b;
padding:15px;
border-radius:20px;
}

.cat-card img{
width:280px;
height:280px;
object-fit:cover;
border-radius:14px;
cursor:pointer;
opacity:0;
transition:opacity .25s;
}

.cat-card img.loaded{
opacity:1;
}

.heart{
font-size:70px;
cursor:pointer;
margin-top:18px;
display:inline-block;
transition:transform .2s;
}

.heart:hover{
transform:scale(1.15);
}

.heart.pop{
animation:heartPop .4s;
}

@keyframes heartPop{
0%{transform:scale(1)}
50%{transform:scale(1.6)}
100%{transform:scale(1)}
}

.emoji-battle{
font-size:40px;
margin-top:20px;
}

.topcats{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.topcats img{
width:120px;
height:120px;
border-radius:12px;
object-fit:cover;
}

.daily img{
width:200px;
border-radius:16px;
}

.footer{
margin-top:60px;
padding:30px 20px;
text-align:center;
color:#888;
}

.footer-links{
display:flex;
justify-content:center;
gap:18px;
flex-wrap:wrap;
margin-bottom:10px;
}

.footer-links a{
color:#aaa;
text-decoration:none;
}

.footer-links a:hover{
color:white;
}


.cat-card{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.heart{
display:block;
margin-top:16px;
font-size:70px;
}


@media (max-width:640px){

.cat-card{
flex-direction:row;
align-items:center;
gap:14px;
}

.cat-card img{
width:42vw;
height:42vw;
max-width:260px;
max-height:260px;
}

.heart{
margin-top:0;
font-size:56px;
}

}

  
</style>
</head>

<body>

<div class="page">

<div class="logo">
<img src="/pink-cat-logo.svg">
<span>LookThatCats</span>
</div>

<div class="subtitle">Vote for the cutest cats on the internet.</div>

<a href="/tournament.html">
<button class="tournament-btn">🏆 Play Daily Cat Tournament</button>
</a>

<div class="section">

<div id="emojiBattle" class="emoji-battle">🐱 VS 😺</div>

<div class="battle">

<div class="cat-card">
<img id="cat1">
<div class="heart" onclick="chooseCat(this)">❤️</div>
</div>

<div class="cat-card">
<img id="cat2">
<div class="heart" onclick="chooseCat(this)">❤️</div>
</div>

</div>

</div>

<div class="line"></div>

<div class="section">

<h2>Top 10 Cats</h2>

<div id="topcats" class="topcats"></div>

</div>

<div class="line"></div>

<div class="section daily">

<h2 style="color:#ff69b4;font-family:Pacifico;">Cat Of The Day</h2>

<img id="dailycat">

</div>

<footer class="footer">

<div class="footer-links">
<a href="/about.html">About</a>
<a href="/privacy.html">Privacy</a>
<a href="/terms.html">Terms</a>
<a href="/contact.html">Contact</a>
</div>

<div>© 2026 LookThatCats • Daily Cat Tournament</div>

</footer>

</div>

<script>

const catEmojis=[
"🐱 VS 😺",
"😺 VS 🐈",
"🐈 VS 🐱",
"😸 VS 🐱",
"🐱 VS 😹",
"😻 VS 🐱"
];

function changeEmoji(){
document.getElementById("emojiBattle").textContent=
catEmojis[Math.floor(Math.random()*catEmojis.length)];
}

function loadImage(img,url){
img.classList.remove("loaded");
img.onload=()=>img.classList.add("loaded");
img.src=url;
}

async function loadBattle(){

const res=await fetch("/api/cats/random");
const data=await res.json();

loadImage(document.getElementById("cat1"),data[0]);
loadImage(document.getElementById("cat2"),data[1]);

changeEmoji();
}

function chooseCat(el){

el.classList.add("pop");

setTimeout(()=>{

el.classList.remove("pop");

loadBattle();

},400);

}

document.getElementById("cat1").onclick=()=>chooseCat(document.querySelectorAll(".heart")[0]);
document.getElementById("cat2").onclick=()=>chooseCat(document.querySelectorAll(".heart")[1]);

async function loadTop(){

const res=await fetch("/api/cats/top");
const data=await res.json();

const container=document.getElementById("topcats");

container.innerHTML="";

data.forEach(url=>{

const img=document.createElement("img");

img.src=url;

container.appendChild(img);

});

}

async function loadDaily(){

const res=await fetch("/api/cats/daily");

const url=await res.json();

document.getElementById("dailycat").src=url;

}

loadBattle();

loadTop();

loadDaily();

</script>

</body>
</html>
