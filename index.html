<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LookThatCats</title>
<style>
  body {
    background-color: #121212;
    color: #eee;
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    text-align: center;
  }
  h1 { margin: 20px; }
  .container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .container img {
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    transition: transform 0.3s, border 0.3s;
    cursor: pointer;
  }
  .container img.selected {
    border: 5px solid pink;
  }
  .vote-buttons button {
    margin: 0 5px;
    padding: 5px 10px;
    background-color: #1f1f1f;
    color: #eee;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
  .vote-buttons button:hover {
    background-color: #333;
  }
  #topCatsContainer { margin-top: 40px; }
  #topCatsContainer h2 { margin-bottom: 10px; }
  .top-cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(120px,1fr));
    gap: 15px;
    justify-items: center;
  }
  .top-cat-grid img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 10px;
    transition: transform 0.3s;
  }
  .top-cat-grid img:hover { transform: scale(1.1); }
  /* Banner alanları */
  #left-ad, #right-ad {
    position: fixed;
    top: 100px;
    width: 120px;
    height: 600px;
    background-color: #222;
    color: #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #left-ad { left: 0; }
  #right-ad { right: 0; }
  #bottom-ad {
    width: 100%;
    height: 90px;
    background-color: #222;
    color: #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    bottom: 0;
  }
</style>
</head>
<body>

<div id="left-ad">Left Banner</div>
<div id="right-ad">Right Banner</div>

<h1>LookThatCats 🐱</h1>

<div class="container">
  <img id="cat1" src="" alt="Cat 1" loading="lazy">
  <img id="cat2" src="" alt="Cat 2" loading="lazy">
</div>

<div class="vote-buttons">
  <button data-score="1">1</button>
  <button data-score="2">2</button>
  <button data-score="3">3</button>
  <button data-score="4">4</button>
  <button data-score="5">5</button>
</div>

<div id="topCatsContainer">
  <h2>Today's Top Cats</h2>
  <div id="topCats" class="top-cat-grid"></div>
</div>

<div id="bottom-ad">Bottom Banner</div>

<script>
const API_KEY = "live_fDX7IYEHhfAbsRlNUYMHWpBRLFjjra8l8ixoHazYl93KLEkPHf5yUuV6OhabAb7R";

// Battle kedileri önbelleği
let battlePool = [];
let selectedCat = null;

// Kediyi seç
document.querySelectorAll('#cat1, #cat2').forEach(img => {
  img.addEventListener('click', () => {
    if (selectedCat) selectedCat.classList.remove('selected');
    img.classList.add('selected');
    selectedCat = img;
  });
});

// Puanlama butonları
document.querySelectorAll('.vote-buttons button').forEach(btn => {
  btn.addEventListener('click', async () => {
    if (!selectedCat) return alert("Select a cat first!");
    const score = btn.dataset.score;
    alert(`You gave ${score} points to the selected cat!`);
    selectedCat.classList.remove('selected');
    selectedCat = null;
    await loadBattleCats();
  });
});

// Battle kedilerini yükleme
async function preloadBattleCats() {
  if (battlePool.length >= 10) return;
  const res = await fetch("https://api.thecatapi.com/v1/images/search?limit=20", {
    headers: {'x-api-key': API_KEY}
  });
  const data = await res.json();
  battlePool = data.map(d => d.url);
}

async function loadBattleCats() {
  await preloadBattleCats();
  const idx1 = Math.floor(Math.random() * battlePool.length);
  let idx2;
  do { idx2 = Math.floor(Math.random() * battlePool.length); } while(idx2 === idx1);
  document.getElementById("cat1").src = battlePool[idx1];
  document.getElementById("cat2").src = battlePool[idx2];
}

// Top 10 kediyi 24 saatte bir yenile
async function loadTopCats() {
  const today = new Date().toISOString().slice(0,10);
  let saved = JSON.parse(localStorage.getItem("topCatsData"));
  if (!saved || saved.date !== today) {
    const topPromises = Array.from({length:10},()=> 
      fetch("https://api.thecatapi.com/v1/images/search", {headers:{'x-api-key': API_KEY}})
        .then(res => res.json())
        .then(data => data[0].url)
    );
    const topCats = await Promise.all(topPromises);
    localStorage.setItem("topCatsData", JSON.stringify({date: today, urls: topCats}));
    saved = {date: today, urls: topCats};
  }
  const container = document.getElementById("topCats");
  container.innerHTML = "";
  saved.urls.forEach(url=>{
    const img = document.createElement("img");
    img.src = url;
    img.loading = "lazy";
    container.appendChild(img);
  });
}

// Başlangıçta yükle
loadBattleCats();
loadTopCats();
</script>

</body>
</html>
