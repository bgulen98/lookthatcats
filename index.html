<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>LookThatCats - Daily Cat Tournament</title>
<meta name="description" content="Vote for the cutest cats, discover the cat of the day, and play the daily cat tournament on LookThatCats.">
<meta name="keywords" content="cute cats, cat tournament, cat voting game, daily cat game, funny cats, cat battle, cat of the day, viral cat site">
<meta name="robots" content="index,follow">
<meta name="theme-color" content="#121212">

<meta property="og:title" content="LookThatCats - Daily Cat Tournament">
<meta property="og:description" content="Vote for the cutest cats and play the daily cat tournament.">
<meta property="og:type" content="website">
<meta property="og:image" content="/pink-cat-logo.svg">
<meta property="og:url" content="https://www.lookthatcats.vip/">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="LookThatCats - Daily Cat Tournament">
<meta name="twitter:description" content="Vote for the cutest cats and play the daily cat tournament.">
<meta name="twitter:image" content="/pink-cat-logo.svg">

<link rel="icon" type="image/svg+xml" href="/pink-cat-logo.svg?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
  background:#121212;
  color:white;
  font-family:Inter, Arial, sans-serif;
  margin:0;
  text-align:center;
}

.page{
  max-width:1200px;
  margin:0 auto;
  padding:24px 16px 50px;
}

.logo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  font-size:34px;
  font-weight:800;
  color:#ff69b4;
  margin-top:10px;
}

.logo img{
  width:58px;
  height:58px;
}

.subtitle{
  color:#aaa;
  margin-top:10px;
  font-size:15px;
}

.section{
  margin-top:40px;
}

.line{
  width:80%;
  height:1px;
  background:#2a2a2a;
  margin:40px auto;
}

.tournament-btn{
  padding:12px 22px;
  background:linear-gradient(90deg,#ff69b4,#ff95cb);
  border:none;
  border-radius:999px;
  color:#161616;
  font-size:16px;
  font-weight:800;
  box-shadow:0 10px 24px rgba(0,0,0,.22);
  cursor:pointer;
}

.battle{
  display:flex;
  justify-content:center;
  gap:32px;
  margin-top:28px;
  flex-wrap:wrap;
}

.cat-card{
  background:#1b1b1b;
  padding:15px;
  border-radius:18px;
  transition:.2s;
}

.cat-card:hover{
  transform:translateY(-2px);
}

.cat-card img{
  width:260px;
  height:260px;
  object-fit:cover;
  border-radius:14px;
  opacity:0;
  transition:opacity .25s ease;
  background:#1f1f1f;
  display:block;
}

.cat-card img.loaded{
  opacity:1;
}

.rate-buttons{
  margin-top:18px;
}

.rate-buttons button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#ff69b4;
  color:white;
  cursor:pointer;
  font-weight:700;
}

.rate-buttons button:hover{
  background:#ff85c4;
}

.topcats{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  padding:0 18px;
}

.topcats img{
  width:120px;
  height:120px;
  border-radius:12px;
  object-fit:cover;
}

.daily img{
  width:200px;
  border-radius:16px;
}

.footer{
  margin-top:60px;
  padding:30px 20px;
  text-align:center;
  color:#888;
  font-size:14px;
}

.footer-links{
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.footer-links a{
  color:#aaa;
  text-decoration:none;
}

.footer-links a:hover{
  color:#fff;
}

.footer-copy{
  color:#777;
}

@media (max-width:640px){
  .cat-card img{
    width:42vw;
    height:42vw;
    max-width:260px;
    max-height:260px;
  }

  .logo{
    font-size:28px;
  }

  .logo img{
    width:50px;
    height:50px;
  }
}
</style>
</head>

<body>
<div class="page">

  <div class="logo">
    <img src="/pink-cat-logo.svg" alt="LookThatCats logo">
    <span>LookThatCats</span>
  </div>

  <div class="subtitle">Vote cute cats, discover today’s favorites, and play the daily bracket.</div>

  <div style="margin:20px 0 8px;">
    <a href="/tournament.html" style="text-decoration:none;">
      <button class="tournament-btn">🏆 Play Daily Cat Tournament</button>
    </a>
  </div>

  <div class="section">
    <h2>Cat vs Cat</h2>

    <div class="battle">
      <div class="cat-card">
        <img id="cat1" alt="Cat 1">
        <div class="rate-buttons">
          <button onclick="rate()">1</button>
          <button onclick="rate()">2</button>
          <button onclick="rate()">3</button>
          <button onclick="rate()">4</button>
          <button onclick="rate()">5</button>
        </div>
      </div>

      <div class="cat-card">
        <img id="cat2" alt="Cat 2">
        <div class="rate-buttons">
          <button onclick="rate()">1</button>
          <button onclick="rate()">2</button>
          <button onclick="rate()">3</button>
          <button onclick="rate()">4</button>
          <button onclick="rate()">5</button>
        </div>
      </div>
    </div>
  </div>

  <div class="line"></div>

  <div class="section">
    <h2>Top 10 Cats</h2>
    <div class="topcats" id="topcats"></div>
  </div>

  <div class="line"></div>

  <div class="section daily">
    <h2 style="color:#ff69b4;font-family:Pacifico,cursive;font-weight:400;">Cat Of The Day</h2>
    <img id="dailycat" alt="Cat of the day">
  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="/about.html">About</a>
      <a href="/privacy.html">Privacy</a>
      <a href="/terms.html">Terms</a>
      <a href="/contact.html">Contact</a>
    </div>
    <div class="footer-copy">© 2026 LookThatCats • Daily Cat Tournament</div>
  </footer>

</div>

<script>
function loadImage(img, url){
  img.classList.remove("loaded");
  img.onload = () => img.classList.add("loaded");
  img.src = url;
}

async function loadBattle(){
  const res = await fetch("/api/cats/random");
  const data = await res.json();
  loadImage(document.getElementById("cat1"), data[0]);
  loadImage(document.getElementById("cat2"), data[1]);
}

function rate(){
  loadBattle();
}

async function loadTop(){
  const res = await fetch("/api/cats/top");
  const data = await res.json();

  const container = document.getElementById("topcats");
  container.innerHTML = "";

  data.forEach(url => {
    const img = document.createElement("img");
    img.src = url;
    img.loading = "lazy";
    container.appendChild(img);
  });
}

async function loadDaily(){
  const res = await fetch("/api/cats/daily");
  const url = await res.json();
  document.getElementById("dailycat").src = url;
}

loadBattle();
loadTop();
loadDaily();
</script>
</body>
</html>
